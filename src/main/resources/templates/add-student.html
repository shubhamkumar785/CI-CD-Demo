<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #eef2f3, #d9e2ec);
        }
        .container {
            background: white;
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            width: 90%;
            max-width: 520px;
        }
        h1 {
            margin-top: 0;
            color: #1b1f24;
            text-align: center;
        }
        form {
            display: grid;
            gap: 12px;
        }
        input {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 8px;
        }
        button, .back {
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }
        button {
            background: #157347;
            color: white;
        }
        .error {
            background: #fde8e8;
            color: #9b1c1c;
            border: 1px solid #f5c2c7;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
        }
        small.error {
            display: block;
            background: none;
            border: none;
            padding: 4px 0;
            color: #9b1c1c;
            font-size: 12px;
        }
        .back {
            background: #6c757d;
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Add Student</h1>
    <form th:action="@{/students}" th:object="${student}" method="post">
        <div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <input type="text" th:field="*{name}" placeholder="Enter student name" required>
        <small class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
        <input type="email" th:field="*{email}" placeholder="Enter student email" required>
        <small class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
        <input type="text" th:field="*{course}" placeholder="Enter student course" required>
        <small class="error" th:if="${#fields.hasErrors('course')}" th:errors="*{course}"></small>
        <input type="date" th:field="*{dateOfJoining}" required>
        <small class="error" th:if="${#fields.hasErrors('dateOfJoining')}" th:errors="*{dateOfJoining}"></small>
        <button type="submit">Save Student</button>
        <a class="back" th:href="@{/}">Back to Home</a>
    </form>
</div>
</body>
</html>

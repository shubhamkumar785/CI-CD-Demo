<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        }
        .container {
            background: white;
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            width: 90%;
            max-width: 520px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: #1b1f24;
        }
        .actions {
            margin-top: 24px;
            display: grid;
            gap: 14px;
        }
        .success {
            background: #e8f5e9;
            color: #1b5e20;
            border: 1px solid #c8e6c9;
            border-radius: 8px;
            padding: 10px;
            margin-top: 12px;
            font-weight: 600;
        }
        .btn {
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 8px;
            font-weight: 600;
            color: white;
            display: inline-block;
        }
        .btn-add {
            background: #157347;
        }
        .btn-count {
            background: #0d6efd;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Student Management System</h1>
    <p>Select an option:</p>
    <div class="success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="actions">
        <a class="btn btn-add" th:href="@{/students/new}">Add Student</a>
        <a class="btn btn-count" th:href="@{/students/count}">Show Total Student</a>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Total Students</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #edf2f7, #e2e8f0);
        }
        .container {
            background: white;
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            width: 90%;
            max-width: 900px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: #1b1f24;
        }
        .count {
            margin: 18px 0 24px;
            font-size: 40px;
            font-weight: 700;
            color: #0d6efd;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
            text-align: left;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 10px;
            font-size: 14px;
        }
        th {
            background: #f8f9fa;
        }
        .empty {
            margin-bottom: 24px;
            color: #6c757d;
            font-weight: 600;
        }
        .error {
            background: #fde8e8;
            color: #9b1c1c;
            border: 1px solid #f5c2c7;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: left;
        }
        a {
            text-decoration: none;
            background: #6c757d;
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: 600;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Total Students</h1>
    <p class="count" th:text="${totalStudents}">0</p>
    <div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <div th:if="${#lists.isEmpty(students)}" class="empty">No students found.</div>
    <table th:if="${!#lists.isEmpty(students)}">
        <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Date of Joining</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="student : ${students}">
            <td th:text="${student.name}">Name</td>
            <td th:text="${student.email}">Email</td>
            <td th:text="${student.course}">Course</td>
            <td th:text="${student.dateOfJoining}">2026-01-01</td>
        </tr>
        </tbody>
    </table>
    <a th:href="@{/}">Back to Home</a>
</div>
</body>
</html>
